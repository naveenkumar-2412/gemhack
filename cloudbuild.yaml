steps:
  # 1. Install dependencies
  - name: node:20
    entrypoint: npm
    args: ["ci"]

  # 2. Run tests — blocks deploy if any test fails
  - name: node:20
    entrypoint: npm
    args: ["test"]
    env:
      - "NODE_ENV=test"

  # 3. Build Docker image
  - name: gcr.io/cloud-builders/docker
    args: ["build", "-t", "${_IMAGE_URI}", "."]

  # 4. Push to Artifact Registry
  - name: gcr.io/cloud-builders/docker
    args: ["push", "${_IMAGE_URI}"]

  # 5. Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_IMAGE_URI}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=1
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GOOGLE_CLOUD_LOCATION=${_REGION},GEMINI_MODEL=gemini-2.0-flash,GEMINI_LIVE_MODEL=gemini-live-2.5-flash-preview,GEMINI_LIVE_ENABLED=true
      - --update-secrets=GEMINI_API_KEY=gemini-api-key:latest

images:
  - ${_IMAGE_URI}

substitutions:
  _REGION: us-central1
  _SERVICE: gemhack-agent
  _IMAGE_URI: us-central1-docker.pkg.dev/${PROJECT_ID}/gemhack/gemhack-agent:latest

options:
  logging: CLOUD_LOGGING_ONLY
