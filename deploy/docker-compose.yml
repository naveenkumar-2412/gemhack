version: "3.9"
services:
  agent:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT:-}
      - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION:-us-central1}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - GEMINI_LIVE_MODEL=${GEMINI_LIVE_MODEL:-gemini-live-2.5-flash-preview}
      - GEMINI_LIVE_ENABLED=${GEMINI_LIVE_ENABLED:-false}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - FIRESTORE_COLLECTION=${FIRESTORE_COLLECTION:-sessions}
    depends_on:
      - firestore-emulator
    restart: unless-stopped

  firestore-emulator:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    command:
      - gcloud
      - beta
      - emulators
      - firestore
      - start
      - --host-port=0.0.0.0:8200
    ports:
      - "8200:8200"
    environment:
      - FIRESTORE_EMULATOR_HOST=0.0.0.0:8200
